<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Social cut-down</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #050403;
        color: #f5f0e8;
        font-family: Inter, system-ui, sans-serif;
        overflow: hidden;
      }
      .hook {
        position: absolute;
        top: 72px;
        left: 48px;
        right: 48px;
        font-size: 58px;
        line-height: 1.05;
        font-weight: 700;
        text-transform: uppercase;
        z-index: 3;
      }
      .accent-pill {
        display: inline-block;
        margin-bottom: 18px;
        padding: 8px 14px;
        background: {{accentColor}};
        color: #050403;
        font-size: 16px;
        letter-spacing: 0.16em;
      }
      .backdrop {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, {{accentColor}}33 0%, #050403 100%);
      }
      video.clip {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(1.05) contrast(1.02);
      }
      .shade {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(5,4,3,0.35) 0%, rgba(5,4,3,0.1) 35%, rgba(5,4,3,0.75) 100%);
        pointer-events: none;
      }
      .caption-line {
        position: absolute;
        left: 50%;
        bottom: 12%;
        max-width: 86%;
        text-align: center;
        font-size: 40px;
        line-height: 1.2;
        color: #f5f0e8;
        text-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="social-cutdown"
      data-start="0"
      data-width="1080"
      data-height="1920"
    >
      <div id="backdrop" class="backdrop"></div>

      <!-- VIDEO_BLOCK -->

      <div id="shade" class="shade clip" data-start="0" data-duration="10" data-track-index="1"></div>

      <div id="hook" class="hook clip" data-start="0.2" data-duration="2.2" data-track-index="2">
        <span class="accent-pill">Hook</span><br />
        {{hookText}}
      </div>

      <!-- CAPTIONS -->

      <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.from("#hook", { opacity: 0, y: -30, duration: 0.45, ease: "back.out(1.4)" }, 0.2);
        tl.to("#hook", { opacity: 0, y: -20, duration: 0.35, ease: "power2.in" }, 2);
        tl.set("#hook", { opacity: 0 }, 2.2);
        /* CAPTION_TIMELINE */
        window.__timelines = window.__timelines || {};
        window.__timelines["social-cutdown"] = tl;
      </script>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interview captioner</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #050403;
        color: #f5f0e8;
        font-family: Inter, system-ui, sans-serif;
        overflow: hidden;
      }
      .brand-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: {{accentColor}};
      }
      .backdrop {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 20%, {{accentColor}}33, #050403 62%);
      }
      .lower-third {
        position: absolute;
        left: 64px;
        bottom: 64px;
        padding: 18px 24px;
        border-left: 4px solid {{accentColor}};
        background: rgba(5, 4, 3, 0.72);
        backdrop-filter: blur(8px);
      }
      .lower-third .name {
        font-size: 34px;
        font-weight: 600;
        margin: 0;
      }
      .lower-third .title {
        margin: 6px 0 0;
        font-size: 20px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: {{accentColor}};
      }
      .intro-card {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .intro-card h1 {
        font-size: 72px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin: 0;
      }
      .intro-card p {
        margin-top: 18px;
        font-family: ui-monospace, monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: {{accentColor}};
      }
      video.clip {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .caption-line {
        position: absolute;
        left: 50%;
        bottom: 10%;
        max-width: 80%;
        text-align: center;
        font-size: 46px;
        line-height: 1.2;
        color: #f5f0e8;
        text-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="interview-captioner"
      data-start="0"
      data-width="1920"
      data-height="1080"
    >
      <div id="brand-bar" class="brand-bar clip" data-start="0" data-duration="12" data-track-index="0"></div>
      <div id="backdrop" class="backdrop" ></div>

      <div id="intro" class="intro-card clip" data-start="0" data-duration="2" data-track-index="1">
        <div style="text-align:center;">
          <h1>{{brandName}}</h1>
          <p>Interview highlight</p>
        </div>
      </div>

      <!-- VIDEO_BLOCK -->

      <div
        id="lower-third"
        class="lower-third clip"
        data-start="2.2"
        data-duration="9.4"
        data-track-index="3"
      >
        <p class="name">{{presenterName}}</p>
        <p class="title">{{presenterTitle}}</p>
      </div>

      <!-- CAPTIONS -->

      <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.from("#intro", { opacity: 0, scale: 0.96, duration: 0.8, ease: "power2.out" }, 0);
        tl.to("#intro", { opacity: 0, duration: 0.35, ease: "power2.in" }, 1.5);
        tl.set("#intro", { opacity: 0 }, 2);
        tl.from("#lower-third", { opacity: 0, x: -40, duration: 0.5, ease: "power2.out" }, 2.2);
        /* CAPTION_TIMELINE */
        window.__timelines = window.__timelines || {};
        window.__timelines["interview-captioner"] = tl;
      </script>
    </div>
  </body>
</html>
